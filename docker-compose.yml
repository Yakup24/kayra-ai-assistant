services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Kayra"
      KNOWLEDGE_DIR: "data/knowledge"
      LOG_DIR: "runtime"
      MIN_CONFIDENCE: "0.22"
      TOKEN_TTL_HOURS: "12"
      REFRESH_TOKEN_TTL_HOURS: "168"
      SUPPORT_USERNAME: "support"
      SUPPORT_PASSWORD: "KayraSupport2026!"
      ALLOWED_ORIGINS: "http://127.0.0.1:8000,http://127.0.0.1:8001,http://localhost:8000,http://localhost:8001"
      LOGIN_RATE_LIMIT: "60"
      API_RATE_LIMIT: "180"
      TICKET_RATE_LIMIT: "90"
      RATE_LIMIT_WINDOW_SECONDS: "60"
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime
